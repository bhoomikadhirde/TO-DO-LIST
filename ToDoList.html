<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="To_style.css">
</head>
<body>
  <div class="container" role="region" aria-label="To-Do List">
    <h1>
      To-Do List
      <!----><svg aria-hidden="true" focusable="false" viewBox="0 0 12 12">
      <path d="M3 5v14h18V5H3zm16 12H5V7h14v10zM7 9h10v2H7V9zm0"/>
      </svg>
    </h1>
    <form id="todo-form" aria-label="Add new task">
      <input type="text" id="task-input" placeholder="Add your task" aria-required="true" aria-describedby="taskInputDesc" autocomplete="off" />
      <button type="submit" aria-label="Add task">Add</button>
    </form>
    <ul id="task-list" aria-live="polite" aria-relevant="additions removals"></ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
